<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal de Noticias{% endblock %}</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 0; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
        nav { background: #34495e; padding: 0.5rem; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        main { padding: 20px; max-width: 800px; margin: auto; min-height: 80px; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; background: #f4f4f4; border-top: 1px solid #ddd; }
        .btn { display: inline-block; padding: 10px 15px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <header>
        <h1>📰 Portal de Noticias UNTDF</h1>
    </header>
    <nav>
        <a href="{% url 'publicaciones:inicio' %}">Inicio</a>
        <a href="{% url 'publicaciones:lista_publicaciones' %}">Publicaciones</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        &copy; 2026 - Laboratorio de Programación - Fabri
    </footer>
</body>
</html>
