{% extends "base.html" %}

{% block content %}
    <h1>{{ publicacion.titulo }}</h1>
    <p><strong>Autor:</strong> {{ publicacion.autor }} | <strong>Fecha:</strong> {{ publicacion.fecha_publicacion }}</p>
    
    <hr>
    <div class="contenido">
        {{ publicacion.contenido|linebreaks }}
    </div>
    <hr>

    <a href="{% url 'publicaciones:lista_publicaciones' %}">← Volver al listado</a>
{% endblock %}
